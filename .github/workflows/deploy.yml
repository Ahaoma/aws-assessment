name: Deploy – Unleash live AWS Assessment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TF_VERSION: "1.8.4"
  WORKING_DIR: "./terraform"

jobs:
  ########## Job 1: Lint & Validate ######################################
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend=false \
            -input=false

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Setup Python (validate Lambda syntax)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Lambda Python syntax
        run: python -m compileall lambdas/
          

  # #####Job 2: Security Scan ###############################################
  security-scan:
    name: Security Scan (Checkov)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov IaC Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          soft_fail: true
          output_format: cli
          download_external_modules: false

  ##### Job 3: Terraform Plan ########################################
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [lint, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -input=false \
            -var="candidate_email=${{ secrets.CANDIDATE_EMAIL }}" \
            -var="candidate_repo=${{ secrets.CANDIDATE_REPO }}" \
            -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 1

  #Job 4: Terraform apply ########################################################
  deploy:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push'
    environment: production

    outputs:
      api_us: ${{ steps.export.outputs.API_URL_US }}
      api_eu: ${{ steps.export.outputs.API_URL_EU }}
      pool_id: ${{ steps.export.outputs.USER_POOL_ID }}
      client_id: ${{ steps.export.outputs.CLIENT_ID }}

    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -input=false

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -input=false tfplan

      - name: Export API URLs
        id: export
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "API_URL_US=$(terraform output -raw api_url_us_east_1)" >> $GITHUB_OUTPUT
          echo "API_URL_EU=$(terraform output -raw api_url_eu_west_1)" >> $GITHUB_OUTPUT
          echo "USER_POOL_ID=$(terraform output -raw cognito_user_pool_id)" >> $GITHUB_OUTPUT
          echo "CLIENT_ID=$(terraform output -raw cognito_client_id)" >> $GITHUB_OUTPUT

  # ####Job 5: Test ###################################
  test:
    name: End-to-End Test
    runs-on: ubuntu-latest
    needs: deploy

    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install boto3 requests

      - name: Run end-to-end test script
        run: |
          python scripts/test.py \
            --user-pool-id "${{ needs.deploy.outputs.pool_id }}" \
            --client-id "${{ needs.deploy.outputs.client_id }}" \
            --username "${{ secrets.CANDIDATE_EMAIL }}" \
            --password "${{ secrets.COGNITO_PASSWORD }}" \
            --api-us "${{ needs.deploy.outputs.api_us }}" \
            --api-eu "${{ needs.deploy.outputs.api_eu }}"
